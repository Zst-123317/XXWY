            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;

            font-size: var(--font-size-small); color: var(--text-muted); flex-wrap: wrap;

        .author-avatar {
            width: 28px; height: 28px; border-radius: 50%;

            font-size: 13px; color: #fff; flex-shrink: 0;
        }
        .author-name { font-weight: 500; color: #576b95; cursor: pointer; }

        .dot-separator { width: 3px; height: 3px; border-radius: 50%; background-color: #ccc; flex-shrink: 0; }
        .publish-time { color: var(--text-muted); }
        .location { color: #576b95; cursor: pointer; font-size: 12px; }
        .location:hover { text-decoration: underline; }

        .cover-placeholder {
            width: 100%; aspect-ratio: 16/9;
            background: linear-gradient(135deg, #3a4a6a 0%, #5a7a8a 30%, #4a6a7a 60%, #2a3a5a 100%);

            color: #f0e8d0; font-size: 42px; letter-spacing: 2px; font-weight: 700;
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .cover-caption { text-align: center; font-size: 12px; color: #aaa; padding: 8px 20px 0; }

        .article-body {
            padding: 20px 20px 28px; font-size: var(--font-size-body);
            color: #2a2a2a; letter-spacing: 0.3px; word-break: break-word;
            line-height: var(--line-height);

        .highlight-text { color: #576b95; font-weight: 500; }
        .article-body blockquote {
            border-left: 4px solid #d0d0d0; padding: 12px 16px; margin: 16px 0;
            background-color: #fafafa; border-radius: 0 6px 6px 0; color: #555; font-size: 15px;

        .article-body .end-mark { text-align: center; color: #bbb; font-size: 13px; margin-top: 20px; }

        .interaction-bar {
            display: flex; align-items: center; justify-content: space-around;
            padding: 14px 20px; border-top: 1px solid var(--border-color); margin: 0 16px; gap: 4px;

        .interaction-item {
            display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-muted);
            cursor: pointer; padding: 8px 12px; border-radius: 18px; transition: all 0.2s; white-space: nowrap;

        }

        .related-card .related-thumb {

        }
        .related-card .related-info { flex: 1; min-width: 0; }
        .related-card .related-title {
            font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .related-card .related-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        .footer-copyright {
            text-align: center; padding: 16px 20px 30px; font-size: 11px;
            color: #ccc; border-top: 0.5px solid #f5f5f5; margin: 0 16px; letter-spacing: 0.3px;
        }

        .toast {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 0, 0, 0.78); color: #fff; padding: 10px 22px; border-radius: 20px;
            font-size: 14px; pointer-events: none; opacity: 0; transition: all 0.3s ease; z-index: 9999;
            white-space: nowrap; letter-spacing: 0.5px;
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 680px) {
            body { background-color: #fff; padding: 0; }
            .article-container { max-width: 100%; box-shadow: none; min-height: 100vh; }
            .article-title { font-size: 20px; }
            .article-body { font-size: 16px; padding: 16px 16px 24px; }
            .article-header { padding: 20px 16px 12px; }
            .interaction-bar { margin: 0 6px; padding: 12px 6px; gap: 0; }
            .interaction-item { padding: 6px 8px; font-size: 12px; gap: 3px; }
            .follow-card { margin: 10px 12px 14px; padding: 12px; }
            .related-section { padding: 10px 12px 16px; margin: 0; }
            .footer-copyright { margin: 0 8px; }
            .top-nav { padding: 10px 12px; }
            .cover-placeholder { font-size: 32px; }
        }
        @media (min-width: 681px) {
            body { padding: 16px 8px; background-color: #e0e0e0; }
            .article-container { border-radius: 12px; overflow: hidden; min-height: auto; margin-bottom: 16px; }
        }
    </style>
</head>

    <script>
        // 動態日期計算
        function getRelativeDate(daysAgo) {
            const now = new Date();
            const target = new Date(now);
            target.setDate(now.getDate() - daysAgo);
            const year = target.getFullYear();
            const month = target.getMonth() + 1;
            const day = target.getDate();
            return `${year}年${month}月${day}日`;
        }

        // 文章資料（使用 daysAgo 控制日期）
        const articles = [
            {
                id: 1,
                title: '探索AI的無限可能：從大語言模型到通用人工智慧的進化之路',
                source: '創意星球實驗室',
                daysAgo: 0,
                thumb: 'https://picsum.photos/id/1015/800/450',
                reads: '4.2萬',
                body: `
                    <p>在過去的兩年裡，<span class="highlight-text">大語言模型（LLM）</span>以驚人的速度重塑了我們與技術互動的方式。從簡單的文字生成到複雜的多模態推理，AI的能力邊界正在以前所未有的速度向外擴展。</p>
                    <h3>一、大語言模型的崛起</h3>

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get('id')) || 1;
        const article = articles.find(a => a.id === articleId);

        if (article) {
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('navBrand').textContent = article.source;
            document.getElementById('authorName').textContent = article.source;
            document.getElementById('authorAvatar').textContent = article.source.charAt(0);
            // 動態日期填充
            const displayDate = getRelativeDate(article.daysAgo);
            document.getElementById('publishTime').textContent = displayDate + ' · 閱讀 ' + article.reads;
            const cover = document.getElementById('coverImage');
            cover.style.backgroundImage = `url('${article.thumb}')`;
            cover.textContent = '';
            document.getElementById('coverCaption').innerHTML = `▲ 圖片來源：${article.source}原創`;
            document.getElementById('articleBody').innerHTML = article.body;
        } else {
            document.getElementById('articleTitle').textContent = '文章不存在';
            document.getElementById('articleBody').innerHTML = '<p style="text-align:center;color:#999;">抱歉，您訪問的文章不存在或已刪除。</p>';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
        }

        let isLiked = false;
        function toggleLike() {
            const likeBtn = document.getElementById('likeBtn');
            isLiked = !isLiked;
            if (isLiked) {
                likeBtn.classList.add('liked');
                const icon = likeBtn.querySelector('.icon');
                icon.style.animation = 'none';
                icon.offsetHeight;
                icon.style.animation = 'heartBeat 0.5s ease';
                showToast('已按讚 ❤️');
            } else {
                likeBtn.classList.remove('liked');
                showToast('已取消按讚');
            }
        }

        let isFollowed = true;
		
		// 页面加载时设置按钮为已关注状态
		document.addEventListener('DOMContentLoaded', function() {
		    const followBtn = document.getElementById('followBtn');
		    if (followBtn) {
		        followBtn.textContent = '已關注';
		        followBtn.classList.add('followed');
		    }
		});
		
        function toggleFollow() {
            const followBtn = document.getElementById('followBtn');
            isFollowed = !isFollowed;
            if (isFollowed) {
                followBtn.textContent = '已關注';
                followBtn.classList.add('followed');
                showToast('已關注公眾號 ✅');
            } else {
                followBtn.textContent = '關注';
                followBtn.classList.remove('followed');
                showToast('已取消關注');
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); toggleLike(); }
            if (e.key === 'f' && e.ctrlKey) { e.preventDefault(); toggleFollow(); }
        });
